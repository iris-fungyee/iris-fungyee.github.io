<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        button {
            padding: 15px 25px;
            margin: 5px;
            font-size: 15px;
            text-align: center;
            border: none;
        }

        button.request {
            color: white;
            background-color: black;
        }

        button.signup {
            color: white;
            background-color: rgb(88, 164, 92);
            font-weight: bold;
            padding: 13px 30px;
            border-radius: 10px;
        }

        button.add {
            background-color: rgb(249, 218, 78);
            padding: 10px 65px;
            border-radius: 50px;
        }

        button.start {
            color: white;
            background-color: rgb(115, 83, 173);
            font-weight: bold;
            border-radius: 5px;

        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="signup">Sign up</button>
    <button class="add">Add to Cart</button>
    <p></p>
    <button class="start">Get started</button>
</body>

</html>
