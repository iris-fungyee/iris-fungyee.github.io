<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
    <style>
        button {
            padding: 12px 25px;
            margin: 5px;
            font-size: 15px;
            font-weight: bold;
            border: none;
        }

        button.request {
            color: white;
            background-color: black;
            font-weight: normal;
            padding: 15px 25px;
        }

        button.signup {
            color: white;
            background-color: rgb(85, 163, 90);
            padding: 13px 30px;
            border-radius: 7px;
        }

        button.add {
            background-color: rgb(249, 218, 78);
            font-weight: normal;
            padding: 10px 65px;
            border-radius: 50px;
        }

        button.start {
            color: white;
            background-color: rgb(115, 83, 173);
            border-radius: 5px;
        }

        button.download {
            color: rgb(114, 120, 127);
            background-color: white;
            border: 2px solid rgb(191, 193, 195);
            border-radius: 5px;
        }

        button.apply {
            color: white;
            background-color: rgb(45, 101, 188);
            border-radius: 50px;
            padding: 12px 28px;
        }

        button.save {
            color: rgb(44, 100, 186);
            background-color: white;
            border: 2px solid rgb(120, 148, 196);
            border-radius: 50px;
            padding: 10px 25px;
        }
    </style>
</head>

<body>
    <button class="request">Request now</button>
    <button class="signup">Sign up</button>
    <button class="add">Add to Cart</button>
    <button class="start">Get started</button>
    <button class="download">Download</button>
    <button class="apply">Apply on company website</button>
    <button class="save">Save</button>
</body>

</html>
