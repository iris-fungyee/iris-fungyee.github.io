<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial;
            margin: auto;
            font-size: 20px;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 100px 10px 100px;
        }

        div.menu_container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        button.request {
            background-color: white;
            border: 1px solid #191A23;
            padding: 20px 35px 20px 35px;
            border-radius: 14px;
            font-size: 20px;
        }

        img.logo {
            vertical-align: middle;
        }

        div.main {
            display: flex;
            justify-content: space-between;
            margin: 60px 100px 60px 100px;
            gap: 30px;

        }

        div.content {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            width: 50%
        }

        h2 {
            font-size: 50px;
            font-weight: 500;
        }

        p {
            line-height: 28px;

        }

        button.book {
            color: white;
            background-color: #191A23;
            font-size: 20px;
            padding: 20px 35px 20px 35px;
            border-radius: 14px;
            margin: 20px 0px 0px 0px;

        }

        div.image {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50%
        }

        div.footer {
            display: flex;
            justify-content: space-between;
            margin: 10px 100px 10px 100px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1> <img class="logo" src="images/icon.png" alt="positivuslogo" width="36" height="36">
                Positivus</h1>
        </div>

        <div class="menu_container">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div> <button class="request">Request a quote</button></div>
        </div>
    </div>

    <div class="main">
        <div class="content">
            <div>
                <h2>Navigating the digital landscape for success</h2>
                <p> Our digital marketing agency helps businesses grow and succeed online through a range
                    of services
                    including SEO, PPC, social media marketing, and content creation.</p>
                <button class="book">Book a consultation</button>
            </div>
        </div>

        <div class="image">
            <img src="images/illustration.png" alt="illustration" width="100%" height="auto">
        </div>
    </div>

    <div class="footer">
        <div> <img src="images/amazonlogo.png" alt="amazonlogo" width="100%"> </div>
        <div> <img src="images/dribble.png" alt="dribblelogo" width="100%"> </div>
        <div> <img src="images/hubspotlogo.png" alt="hubspotlogo" width="100%"> </div>
        <div> <img src="images/notion.png" alt="notionlogo" width="100%"> </div>
        <div> <img src="images/netflixlogo.png" alt="netflixlogo" width="100%"> </div>
        <div> <img src="images/zoomlogo.png" alt="zoomlogo" width="100%"> </div>
    </div>
</body>

</html>
