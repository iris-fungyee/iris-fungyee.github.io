<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        div.menu_container {
            display: flex;
            gap: 10px;
            align-items: center;

        }

        button.request {
            border: 1px solid black;
            padding: 10px;
            border-radius: 5px;
        }

        div.main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        div.footer {
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1>Positivus</h1>
        </div>

        <div class="menu_container">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div> <button class="request">Request a quote</button></div>
        </div>
    </div>

    <div class="main">
        <div class="content">
            <div>
                <h2>Navigating the digital landscape for success</h2>
            </div>
            <div>
                <p> Our digital marketing agency help businesses grow and succeed online through a range of services
                    including SEO, PPC, social media marketing, and content creation.</p>
            </div>
            <div> <button class="book">Book a consultation</button></div>
        </div>

        <div class="image">
            <div>
                <img src="images/illustration.png" alt="illustration" width="600.46" height="515">
            </div>
        </div>
    </div>

    <div class="footer">
        <div> <img src="images/amazon.png" alt="amazonlogo"> </div>
        <div> <img src="images/dribble.png" alt="dribblelogo"> </div>
        <div> <img src="images/hubspot.png" alt="hubspotlogo"> </div>
        <div> <img src="images/notion.png" alt="notionlogo"> </div>
        <div> <img src="images/netflix.png" alt="netflixlogo"> </div>
        <div> <img src="images/zoom.png" alt="zoomlogo"> </div>
    </div>
</body>

</html>
