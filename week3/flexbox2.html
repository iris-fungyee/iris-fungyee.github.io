<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial;
            margin: auto;
        }

        div.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 100px 30px 100px;
        }

        img.logo {
            vertical-align: middle;
        }

        div.menu_container {
            display: flex;
            gap: 40px;
            align-items: center;
            font-size: 20px;

        }

        button.request {
            background-color: white;
            border: 1px solid #191A23;
            padding: 20px 35px 20px 35px;
            border-radius: 14px;
            font-size: 20px;
        }

        div.main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 100px;
        }

        div.content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 {
            font-size: 60px;
            font-weight: 500;
        }

        p {
            font-size: 20px;
            font-weight: 400;
            line-height: 28px;
        }

        button.book {
            color: white;
            background-color: #191A23;
            font-size: 20px;
            padding: 20px 35px 20px 35px;
            border-radius: 14px;
        }

        div.image {
            display: flex;
        }

        div.footer {
            display: flex;
            justify-content: space-between;
            margin: 20px 100px 20px 100px;
        }
    </style>
</head>

<body>
    <div class="header">
        <div>
            <h1> <img class="logo" src="images/logoicon.png" alt="positivusicon" width="30" height="30">
                Positivus</h1>
        </div>

        <div class="menu_container">
            <div>About us</div>
            <div>Services</div>
            <div>Use Cases</div>
            <div>Pricing</div>
            <div>Blog</div>
            <div> <button class="request">Request a quote</button></div>
        </div>
    </div>

    <div class="main">
        <div class="content">
            <div>
                <h2>Navigating the digital landscape for success</h2>
            </div>
            <div>
                <p> Our digital marketing agency helps businesses grow and succeed online through a range of services
                    including SEO, PPC, social media marketing, and content creation.</p>
            </div>
            <div> <button class="book">Book a consultation</button></div>
        </div>

        <div class="image">
            <div>
                <img src="images/illustration.png" alt="illustration" width="600.46" height="515">
            </div>
        </div>
    </div>

    <div class="footer">
        <div> <img src="images/amazonlogo.png" alt="amazonlogo"> </div>
        <div> <img src="images/dribble.png" alt="dribblelogo"> </div>
        <div> <img src="images/hubspotlogo.png" alt="hubspotlogo"> </div>
        <div> <img src="images/notion.png" alt="notionlogo"> </div>
        <div> <img src="images/netflixlogo.png" alt="netflixlogo"> </div>
        <div> <img src="images/zoomlogo.png" alt="zoomlogo"> </div>
    </div>
</body>

</html>
