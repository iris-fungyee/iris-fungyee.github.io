<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementra</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap');
        /*@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oxygen:wght@300;400;700&display=swap');*/

        body {
            background-color: #f6f5ef;
            font-family: "Oxygen";
            margin: 10px;
        }

        div.projects {
            display: flex;
            justify-content: space-evenly;
            gap: 30px;
            max-width: 1024px;
            margin: auto;
        }

        p {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            padding: 0px 18px 0px 18px;
        }

        img {
            border-radius: 8px;
        }

        div.residential {
            display: flex;
            flex-direction: column;
            background-color: white;
            padding: 15px 15px 20px 15px;
            border-radius: 16px;
        }

        h1 {
            /*font-family: "Montserrat";*/
            font-size: 28px;
            font-weight: bolder;
            line-height: 1;
            padding: 0px 18px 0px 18px;
            margin: 30px 0px 0px 0px;
        }

        div.commercial {
            display: flex;
            flex-direction: column;
            background-color: white;
            padding: 15px 15px 20px 15px;
            border-radius: 16px;
        }

        h2 {
            font-size: 28px;
            font-weight: bolder;
            line-height: 1;
            padding: 0px 18px 0px 18px;
            margin: 30px 0px 0px 0px;
        }

        div.infrastructure {
            display: flex;
            flex-direction: column;
            background-color: white;
            padding: 15px 15px 20px 15px;
            border-radius: 16px;
        }

        h3 {
            font-size: 28px;
            font-weight: bolder;
            line-height: 1;
            padding: 0px 18px 0px 18px;
            margin: 30px 0px 0px 0px;
        }

        /*@media screen and (max-width: 930px) {
            div.projects {
                flex-direction: column;
            }

            .residential {
                width: 70%;
                margin: auto;
            }

            .commercial {
                width: 70%;
                margin: auto;
            }

            .infrastructure {
                width: 70%;
                margin: auto;
            }
        }


        @media screen and (max-width: 550px) {
            .residential {
                width: 90%;
            }

            .commercial {
                width: 90%;
            }

            .infrastructure {
                width: 90%;
            }

        }*/
    </style>
</head>

<body>
    <div class="projects">

        <div class="residential">
            <div> <img src="images/residential.jpg" alt="residentialproj" width="100%"> </div>
            <div>
                <h1>Residential projects</h1>
                <p>We build sustainable and modern homes for comfortable living.</p>
            </div>
        </div>

        <div class="commercial">
            <div> <img src="images/commercial.jpg" alt="commercialspc" width="100%"> </div>
            <div>
                <h2>Commercial spaces</h2>
                <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
            </div>
        </div>

        <div class="infrastructure">
            <div> <img src="images/infrastructure.jpg" alt="infraworks" width="100%"> </div>
            <div>
                <h2>Infrastructure works</h2>
                <p>We develop strong, reliable infrastructure for growing communities.</p>
            </div>
        </div>
    </div>


</body>

</html>
